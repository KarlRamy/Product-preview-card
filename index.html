<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="master.css">
        <title>product card</title>
    </head>

    <body>
        <div class="card-components">
            <div class="left">
                <img src="image-product-desktop.jpg" alt="product image">
            </div>
            <div class="right">
                <h1>P e r f u m e</h1>
                <h2>
                    Gabrielle Essence Eau
                    De Parfum
                </h2>
                <p>A floral, solar and voluptuous
                interpretation composed by
                Olivier Polge, Perfumer-Creator
                for the House of CHANEL.</p>
                <div class="price">
                    <h3>$149.99</h3>
                    <del>$169.99</del>
                </div>
                <button>Add to cart</button>
            </div>
        </div>
    </body>
</html>
